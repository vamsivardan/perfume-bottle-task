<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Product Preview Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="card">

    <div class="card-image">
      <img src="https://cdn.pixabay.com/photo/2021/12/28/16/40/perfume-6899766_1280.jpg"
           alt="Gabrielle Essence Eau De Parfum bottle placed on leaves">
    </div>

    <div class="card-content">
      <p class="category">PERFUME</p>

      <h1>Gabrielle Essence Eau De Parfum</h1>

      <p class="description">
        A floral, solar and voluptuous interpretation composed by 
        Olivier Polge, Perfumer-Creator for the House of CHANEL.
      </p>

      <div class="price">
        <span class="new-price">$199.99</span>
        <span class="old-price">$269.99</span>
      </div>

      <button>
        🛒 Add to Cart
      </button>
    </div>

  </div>

</body>
</html>
